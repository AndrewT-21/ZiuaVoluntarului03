<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Înscriere</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: url("/static/images/2.jpg") no-repeat center center/cover;
  min-height: 100vh;
}

/* overlay */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
}

/* CARD */
.card {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);

  width: 95%;
  max-width: 520px;

  background: white;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

/* HEADER */
.card-header {
  background: linear-gradient(135deg, #ff4b2b, #900000);
  padding: 18px;
  text-align: center;
  color: white;
}

.card-header h2 {
  margin: 0;
}

/* IMAGE */
.post-image {
  width: 100%;
  height: 160px;
  object-fit: cover;
}

/* FORM */
form {
  padding: 18px;
}

/* ROW */
.row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}

.row label {
  flex: 0 0 35%;
  font-size: 13px;
  font-weight: bold;
}

.row input {
  flex: 1;
  padding: 8px 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
  font-size: 13px;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  background: #900000;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  cursor: pointer;
}

/* MINORI */
#text-minori {
  display: none;
  font-size: 12px;
  margin-bottom: 10px;
}

/* 🔥 MOBILE OPTIM */
@media (max-width: 480px) {

  .card {
    width: 92%;
    max-width: 420px;
    max-height: 80vh;
    overflow-y: auto;
  }

  .card-header {
    padding: 12px;
  }

  .card-header h2 {
    font-size: 16px;
  }

  .post-image {
    height: 110px;
  }

  form {
    padding: 12px;
  }

  .row {
    flex-direction: column;
    align-items: flex-start;
    margin-bottom: 6px;
  }

  .row label {
    width: 100%;
    font-size: 11px;
  }

  .row input {
    width: 100%;
    font-size: 13px;
    padding: 7px;
  }

  button {
    padding: 10px;
    font-size: 14px;
  }
}
</style>
</head>

<body>

<div class="card" id="card">

  <div class="card-header">
    <h2>Ziua Voluntarului 03</h2>
  </div>

  <img class="post-image" src="{{ url_for('static', filename='images/1.jpg') }}">

  <form id="inscriereForm">

    <div class="row">
      <label>Nume</label>
      <input name="nume" required>
    </div>

    <div class="row">
      <label>Prenume</label>
      <input name="prenume" required>
    </div>

    <div class="row">
      <label>Vârstă</label>
      <input type="number" id="varsta" name="varsta" oninput="verificaVarsta()" required>
    </div>

    <div class="row">
      <label>Telefon</label>
      <input name="telefon" required>
    </div>

    <div class="row">
      <label>Județ</label>
      <input name="judet" required>
    </div>

    <div class="row">
      <label>Oraș</label>
      <input name="oras" required>
    </div>

    <div class="row">
      <label>Email</label>
      <input type="email" name="email" required>
    </div>

    <div id="text-minori">
      <input type="checkbox" name="acord-parinti" value="1">
      Acordul părinților este obligatoriu!
    </div>

    <button type="submit">Înscrie-te</button>

  </form>
</div>

<script>
function verificaVarsta() {
  let v = document.getElementById("varsta").value;
  document.getElementById("text-minori").style.display =
    (v && parseInt(v) < 18) ? "block" : "none";
}

/* SUBMIT */
document.getElementById("inscriereForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const formData = new FormData(this);

  const res = await fetch("/", {
    method: "POST",
    body: formData
  });

  if (res.ok) {
    document.getElementById("card").innerHTML = `
      <div style="padding:30px;text-align:center;">
        <h2>✔ Înscriere reușită</h2>
        <p>Mulțumim! Te-ai înregistrat cu succes.</p>

        <button onclick="location.reload()" style="
          margin-top:20px;
          padding:12px;
          border:none;
          border-radius:10px;
          background:#900000;
          color:white;
          cursor:pointer;">
          ➕ Altă înregistrare
        </button>
      </div>
    `;
  }
});
</script>

</body>
</html>
