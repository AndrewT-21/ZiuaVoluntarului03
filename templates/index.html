<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Înscriere</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: url("/static/images/2.jpg") no-repeat center center/cover;
  min-height: 100vh;
}

/* overlay */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
}

/* START */
.start {
  position: absolute;
  top: 3%;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  z-index: 10;
}

.arrow {
  font-size: 42px;
  color: white;
  animation: bounce 1s infinite;
  margin-bottom: 6px;
}

.logo {
  width: 95px;
  height: 95px;
  border-radius: 50%;
  cursor: pointer;
  box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}

/* CARD */
.card {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -60%) scale(0.95);

  width: 100%;
  max-width: 520px;

  background: white;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);

  opacity: 0;
  pointer-events: none;
  transition: all 0.8s ease;
}

.card.active {
  opacity: 1;
  pointer-events: auto;
  transform: translate(-50%, -50%) scale(1);
}

/* HEADER */
.card-header {
  background: linear-gradient(135deg, #ff4b2b, #900000);
  padding: 20px;
  text-align: center;
  color: white;
}

.card-header img {
  width: 60px;
  height: 60px;
  border-radius: 50%;
}

/* FORM */
form {
  padding: 20px;
}

label {
  font-size: 12px;
  font-weight: bold;
}

input {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
  font-size: 14px;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  background: #900000;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 16px;
}

/* POST IMAGE */
.post-image {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

/* MINORI */
#text-minori {
  display: none;
  font-size: 12px;
  margin-bottom: 10px;
}

/* X BUTTON */
.close-btn {
  position: absolute;
  top: 10px;
  right: 12px;
  width: 34px;
  height: 34px;
  background: rgba(0,0,0,0.2);
  color: white;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

/* ANIM */
@keyframes bounce {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

/* MOBILE */
@media (max-width: 480px) {
  .card {
    max-width: 100%;
    width: 100%;
    bottom: 0;
    top: auto;
    left: 0;
    transform: none;
    border-radius: 18px 18px 0 0;
    max-height: 85vh;
    overflow-y: auto;
  }

  .card.active {
    transform: translateY(0);
  }
}
</style>
</head>

<body>

<!-- START -->
<div class="start" id="start">
  <div class="arrow">⬇</div>
  <img class="logo"
       src="{{ url_for('static', filename='images/logo.png') }}"
       onclick="openCard()">
</div>

<!-- CARD -->
<div class="card" id="card">

  <div class="close-btn" onclick="closeCard()">✕</div>

  <div class="card-header">
    <img src="{{ url_for('static', filename='images/logo.png') }}">
    <h2>Ziua Voluntarului</h2>
  </div>

  <img class="post-image" src="{{ url_for('static', filename='images/1.jpg') }}">

  <form id="inscriereForm">

    <label>Nume</label>
    <input name="nume" required>

    <label>Prenume</label>
    <input name="prenume" required>

    <label>Vârstă</label>
    <input type="number" id="varsta" name="varsta" oninput="verificaVarsta()" required>

    <label>Telefon</label>
    <input name="telefon" required>

    <label>Județ</label>
    <input name="judet" required>

    <label>Oraș</label>
    <input name="oras" required>

    <label>Email</label>
    <input type="email" name="email" required>

    <div id="text-minori">
      <input type="checkbox" name="acord-parinti" value="1">
      Părinții sunt de acord
    </div>

    <button type="submit">Înscrie-te</button>
  </form>
</div>

<script>
function openCard() {
  document.getElementById("start").style.display = "none";
  document.getElementById("card").classList.add("active");
}

function closeCard() {
  document.getElementById("card").classList.remove("active");
  document.getElementById("start").style.display = "flex";
}

function verificaVarsta() {
  let v = document.getElementById("varsta").value;
  document.getElementById("text-minori").style.display =
    (v && parseInt(v) < 18) ? "block" : "none";
}

function newEntry() {
  document.getElementById("card").classList.add("active");
  document.getElementById("inscriereForm").style.display = "block";
  document.getElementById("inscriereForm").reset();
}

document.getElementById("inscriereForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const formData = new FormData(this);

  const res = await fetch("/", {
    method: "POST",
    body: formData
  });

  if (res.ok) {
    document.querySelector(".card").innerHTML = `
  <div style="padding:40px;text-align:center; position:relative;">

    <h2>✔ Înscriere reușită</h2>
    <p>Mulțumim! Te-ai înregistrat cu succes.</p>

    <button onclick="restartForm()" 
      style="
        margin-top:20px;
        padding:12px 18px;
        border:none;
        border-radius:10px;
        background:#900000;
        color:white;
        font-weight:bold;
        cursor:pointer;
      ">
      ➕ Altă înregistrare
    </button>

  </div>
`;
  }
});
</script>

</body>
</html>
