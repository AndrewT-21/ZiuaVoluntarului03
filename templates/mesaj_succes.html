<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Înscriere reușită</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;

  /* mai stabil pe mobile decât 100vh */
  min-height: 100dvh;

  background: linear-gradient(135deg, #900000, #3b0000);

  display: flex;
  justify-content: center;
  align-items: center;

  padding: 20px;
  color: white;
  text-align: center;
}

.message-container {
  width: 100%;
  max-width: 420px;

  background: rgba(96, 0, 0, 0.92);
  border-radius: 16px;

  padding: 28px;

  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);

  animation: pop 0.4s ease-out;
}

/* titlu */
h1 {
  font-size: 20px;
  margin-bottom: 10px;
  line-height: 1.3;
}

/* text */
p {
  font-size: 14px;
  opacity: 0.9;
  line-height: 1.4;
}

/* animație */
@keyframes pop {
  0% {
    transform: scale(0.85);
    opacity: 0;
  }
  100% {
    transform: scale(1);
    opacity: 1;
  }
}

/* 📱 MOBILE EXTRA FIX */
@media (max-width: 480px) {
  body {
    padding: 16px;
  }

  .message-container {
    width: 100%;
    border-radius: 14px;
    padding: 22px;
  }

  h1 {
    font-size: 18px;
  }

  p {
    font-size: 13px;
  }
}
</style>
</head>

<body>

<div class="message-container">
  <h1>✔ Înscrierea a fost realizată cu succes!</h1>
  <p>Mulțumim că te-ai înscris la evenimentul "Ziua Voluntarului 02".</p>
</div>

</body>
</html>
